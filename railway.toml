[build]

[deploy]
preDeployCommand = "node scripts/db-migrate.js"
startCommand = "./node_modules/.bin/next start -H 0.0.0.0"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[crons]]
name = "sofia-match-alerts"
schedule = "0 * * * *"
command = "curl -sf -X POST ${NEXT_PUBLIC_APP_URL}/api/cron/match-alerts -H \"x-cron-secret: ${CRON_SECRET}\" || true"
