[phases.setup]
# System libraries required by Playwright's bundled Chromium
nixPkgs = [
  "alsa-lib",
  "at-spi2-atk",
  "at-spi2-core",
  "atk",
  "cairo",
  "cups",
  "dbus",
  "expat",
  "fontconfig",
  "freetype",
  "gdk-pixbuf",
  "glib",
  "gtk3",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "nspr",
  "nss",
  "pango",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXcursor",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXi",
  "xorg.libXrandr",
  "xorg.libxshmfence",
  "xorg.libXtst",
  "xorg.libxcb",
]

[phases.install]
# Install node packages, then download Playwright's own Chromium binary
cmds = [
  "PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci",
  "npx playwright install chromium",
]

[variables]
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
