name: Saved Search Alerts

on:
  schedule:
    # Daily at 9 AM ET (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Call saved-search-alerts endpoint
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/saved-search-alerts")

          echo "HTTP status: $RESPONSE"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json

          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "❌ Saved-search alerts failed with HTTP $RESPONSE"
            exit 1
          fi

          echo "✅ Saved-search alerts completed"
